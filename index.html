<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Syed Muhammad Hamza | Portfolio</title>
    <script>
      // Defensive check to identify what is attempting to overwrite fetch
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { 
              console.warn('Attempted to overwrite window.fetch with:', v);
              // We ignore the set attempt to prevent the TypeError
            },
            configurable: true
          });
        } catch (e) {
          console.error('Failed to redefine fetch property:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
